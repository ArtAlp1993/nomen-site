name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Подставляет basePath автоматически: /nomen-site на адресе *.github.io,
      # корень — когда подключён свой домен.
      - uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_TG_TOKEN: ${{ secrets.NEXT_PUBLIC_TG_TOKEN }}
          NEXT_PUBLIC_TG_CHAT_ID: ${{ secrets.NEXT_PUBLIC_TG_CHAT_ID }}
          # Соль подписи персональных ссылок /reading (lib/readingLink.js).
          # Без секрета берётся dev-соль — ссылки продолжат работать, но
          # подпись предсказуема. Задать: Settings → Secrets → Actions.
          NEXT_PUBLIC_READING_SALT: ${{ secrets.NEXT_PUBLIC_READING_SALT || 'nomen-dev-salt' }}
      # Сторож служебных страниц (Contact/Refunds/Delivery/Privacy/Terms…):
      # проверяет собранный out/, поэтому живёт здесь, а не в verify.yml —
      # там сборки нет. Деплой падает, если страница пропала из сборки или
      # в неё вернулась почта-заглушка.
      - run: npm run verify:legal
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
